name: poetit
adopt-info: poetit   # version is pulled from pyproject.toml by the poetit part
summary: Desktop poetry editor with meter, rhyme, thesaurus, and version control
description: |
  Poetit is a line-by-line poetry editor built with Python and tkinter.

  Features:
    - Syllable counts via bundled CMU Pronouncing Dictionary
    - Stress-marked meter display (prosodic or NLTK fallback)
    - Rhyme scheme detection and word-level rhyme lookup
    - Spell check with inline misspelling marks and suggestions
    - Thesaurus and WordNet definitions (bundled)
    - Dependency-parse diagrams via Stanza (Stanford NLP)
    - Git-based version control with commit history browser

  Poems are stored in ~/Documents/Poetit/.
  No Electron, no browser — pure Python desktop app.

grade: stable
confinement: strict
base: core24

parts:
  launcher:
    plugin: dump
    source: snap/local/
    organize:
      launch: bin/poetit-launch

  poetit:
    plugin: python
    source: .
    # Pin torch to the CPU-only build: PyPI's torch is a CUDA build that adds
    # ~4.5 GB poetit can never use. The pin only exists on the pytorch.org CPU
    # index (PIP_EXTRA_INDEX_URL below). Keep the version in sync with
    # flatpak/python3-torch-cpu.json.
    python-packages:
      - torch==2.12.0+cpu
      - .
    build-environment:
      - PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
    override-pull: |
      craftctl default
      # Single source of truth for the version: pyproject.toml [project].version
      craftctl set version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
    override-build: |
      craftctl default
      # Strip stanza/torch files poetit can never execute (headers, bundled
      # binaries, test suites, type stubs) and verify the result still imports.
      SITE_PACKAGES=$(ls -d "$CRAFT_PART_INSTALL"/lib/python3.*/site-packages)
      python3 "$CRAFT_PART_BUILD"/scripts/trim_nlp_footprint.py \
          --site-packages "$SITE_PACKAGES" --expect-cpu
      "$CRAFT_PART_INSTALL"/bin/python3 -c "import torch; torch.zeros(2).sum(); import stanza.pipeline.core; import stanza.resources.common"
    stage-packages:
      - python3-tk
      - libpython3-stdlib
      - tk8.6-blt2.5

apps:
  poetit:
    command: bin/poetit-launch
    extensions: [gnome]
    plugs:
      # The app resolves every path through os.path.expanduser("~"), which under
      # strict confinement is the snap-private home ($SNAP_USER_DATA). So the
      # repo (~/Documents/Poetit), state (~/.poetit) and model caches
      # (~/stanza_resources, ~/nltk_data) all live inside the sandbox and need
      # no interface. `home` is here purely so the Import/Export/Open file
      # dialogs can reach the user's real, non-hidden home files.
      - home
      - network          # Stanza downloads its English model on first use
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
