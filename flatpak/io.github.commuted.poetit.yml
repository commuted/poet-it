app-id: io.github.commuted.poetit
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: poetit

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --share=network          # stanza/spaCy models download on first launch
  - --device=dri
  - --env=PYTHONPATH=/app/lib/python3.12/site-packages

modules:
  # CPU-only torch must install first: it satisfies stanza's torch>=1.13
  # requirement so the generated modules below never pull the CUDA build.
  - python3-torch-cpu.json

  # python3-requirements.json is generated by ./flatpak/generate-pip-sources.sh
  # It defines one sub-module per dependency for offline Flathub builds
  # (torch is excluded there — see python3-torch-cpu.json above).
  - python3-requirements.json

  - name: poetit
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-deps --no-cache-dir --prefix=${FLATPAK_DEST} .
      - install -Dm644 poetit/data/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.commuted.poetit.png
      - install -Dm644 flatpak/io.github.commuted.poetit.desktop
          /app/share/applications/io.github.commuted.poetit.desktop
      # Strip stanza/torch files poetit can never execute (headers, bundled
      # binaries, test suites, type stubs) and verify the result still imports.
      - python3 scripts/trim_nlp_footprint.py
          --site-packages=${FLATPAK_DEST}/lib/python3.12/site-packages
          --expect-cpu
      - PYTHONPATH=${FLATPAK_DEST}/lib/python3.12/site-packages python3 -c
          "import torch; torch.zeros(2).sum(); import stanza.pipeline.core; import stanza.resources.common"
    sources:
      # For local builds use: type: dir, path: ..
      # For Flathub replace with a git tag + commit:
      #   type: git
      #   url: https://github.com/commuted/poetit.git
      #   tag: v0.1.0
      #   commit: <full sha>
      - type: dir
        path: ..
